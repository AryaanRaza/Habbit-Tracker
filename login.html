<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Habit Tracker</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="auth-page">
    <img src="img/streakasaur-welcome.png" class="mascot-auth login-pos" alt="Streakasaur"
        title="Streakasaur missed you! Ready to log today's progress?">
    <div class="auth-card">
        <header class="form-header">
            <h1>HabitFlow</h1>
            <h2>Welcome Back</h2>
            <p>Enter your details to continue</p>
        </header>

        <form action="#" class="auth-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-glow">Login</button>

            <p class="switch-auth">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </form>
    </div>

    <body>

</html>
