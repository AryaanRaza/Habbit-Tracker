<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Habit Tracker</title>
    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>
    <header class="top">
        <h1 class="headline">Habit Tracker</h1>
        <h2 class="Subhead">Build better habits,one day at a time</h2>
    </header>
    <section class="status">
        <div class="card">
            <h1>Current Streak</h1>
            <h2>15</h2>
        </div>
       <div class="card">
            <h1>Best Streak</h1>
            <h2>15</h2>
        </div>
       <div class="card">
            <h1>Total Completions</h1>
            <h2>15</h2>
        </div>  
    </section>
    <main class="card2">
       
        <div class="Addcard">
        <input type="text" id="myinput" placeholder="Enter a new habit.."></input>
        <span onclick="newelement()", class="Addhabit">+ Add Habit</span>
        </div> 
    </main>
    
</body>
</html>
