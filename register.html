<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HabitFlow</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Leckerli+One&family=Akronim&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- BASE -->
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/root.css">

    <!-- GLOBAL -->
    <link rel="stylesheet" href="css/global.css">

    <!-- COMPONENTS -->
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/password-strength.css">


    <!-- PAGE -->
    <link rel="stylesheet" href="css/pages/auth.css">
</head>

<body class="auth-page">

    <!-- Dreamy Background Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <main class="auth-shell">

        <div class="auth-card" id="auth-card">

            <!-- Mascot anchored to card -->
            <div class="auth-mascot-wrap">
                <img src="img/streakasaur-welcome.png" alt="Waving Habit Dino Mascot" class="mascot-auth reg-pos"
                    title="Streakasaur is excited to help you grow!">
            </div>

            <!-- ── Brand + headings ── -->
            <header class="form-header">
                <h1 class="auth-brand">HabitFlow</h1>
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-sub">Set your goals in motion today</p>
            </header>

            <form action="#" class="auth-form" id="register-form" novalidate>

                <!-- First + Last name row -->
                <div class="name-row">
                    <div class="input-group">
                        <label for="firstName">First Name</label>
                        <div class="input-wrap">
                            <span class="input-icon material-symbols-rounded">badge</span>
                            <input type="text" name="firstName" id="firstName" placeholder="Aryaan"
                                autocomplete="given-name" required autofocus>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="lastName">Last Name</label>
                        <div class="input-wrap">
                            <span class="input-icon material-symbols-rounded">badge</span>
                            <input type="text" name="lastName" id="lastName" placeholder="Raza"
                                autocomplete="family-name" required>
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <span class="input-icon material-symbols-rounded">alternate_email</span>
                        <input type="email" id="email" name="email" placeholder="name@example.com" autocomplete="email"
                            required>
                    </div>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon material-symbols-rounded">lock</span>
                        <input type="password" id="password" name="password" placeholder="••••••••"
                            autocomplete="new-password" required>
                        <button type="button" class="pw-toggle" data-target="password" title="Show/hide">
                            <span class="material-symbols-rounded">visibility</span>
                        </button>

                    </div>
                    <!-- Password strength bar -->
                    <div class="pw-strength" id="pw-strength">
                        <div class="pw-strength-track">
                            <div class="pw-strength-fill" id="pw-strength-fill"></div>
                        </div>
                        <span class="pw-strength-label" id="pw-strength-label"></span>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrap">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••"
                            autocomplete="new-password" required>
                        <button type="button" class="pw-toggle" data-target="confirmPassword" title="Show/hide">
                            <span class="material-symbols-rounded">visibility</span>
                        </button>
                    </div>
                    <!-- Match indicator -->
                    <p class="pw-match-msg hidden" id="pw-match-msg"></p>
                </div>

                <!-- Terms checkbox -->
                <div class="form-options terms-row">
                    <label class="remember-me">
                        <input type="checkbox" required>
                        <span class="custom-check"></span>
                        <span>
                            I agree to the
                            <a href="settings/terms.html?from=register">Terms of Service</a>
                            and
                            <a href="settings/policy.html?from=register">Privacy Policy</a>.
                        </span>
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-auth">
                    <span>Create Account</span>
                    <span class="btn-auth-icon material-symbols-rounded">arrow_forward</span>
                </button>

                <!-- Switch to login -->
                <p class="switch-auth">
                    Already have an account?
                    <a href="login.html">Login →</a>
                </p>
            </form>
        </div>
        <div id="toast" class="toast"></div>
    </main>
    <script src="js/core/storage.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/redirect.js"></script>

    <script src="js/auth/auth-ui.js"></script>
</body>

</html>
