<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HabitFlow</title>
    <!-- BASE -->
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/root.css">

    <!-- GLOBAL -->
    <link rel="stylesheet" href="css/global.css">

    <!-- COMPONENTS -->
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/chips.css">
    <link rel="stylesheet" href="css/components/modal.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/navigation.css">

    <!-- PAGE -->
    <link rel="stylesheet" href="css/pages/dashboard.css">
    <link rel="stylesheet" href="css/pages/landing-page.css">
    <link rel="stylesheet" href="css/pages/auth.css">
</head>

<body class="auth-page">

    <!-- Dreamy Background Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <main class="auth-shell">

        <div class="auth-card">

            <!-- Mascot anchored to card -->
            <div class="auth-mascot-wrap">
                <img src="img/streakasaur-welcome.png" alt="Waving Habit Dino Mascot" class="mascot-auth reg-pos"
                    title="Streakasaur is excited to help you grow!">
            </div>

            <header class="form-header">
                <h1>HabitFlow</h1>
                <h2>Create Account</h2>
                <p>Set your goals in motion.</p>
            </header>

            <form action="#" class="auth-form">

                <div class="name-row">
                    <div class="input-group">
                        <label for="firstName">First Name</label>
                        <input type="text" name="firstName" id="firstName" placeholder="Jane" autocomplete="given-name"
                            required autofocus>
                    </div>

                    <div class="input-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" name="lastName" id="lastName" placeholder="Doe" autocomplete="family-name"
                            required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" autocomplete="email"
                        required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                        autocomplete="new-password" required>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••"
                        autocomplete="new-password" required>
                </div>

                <div class="form-options terms-row">
                    <label class="remember-me terms-check">
                        <input type="checkbox" required>
                        <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-glow">Sign Up</button>

                <p class="switch-auth">
                    Already have an account? <a href="login.html">Login</a>
                </p>
            </form>
        </div>

    </main>

</body>

</html>
