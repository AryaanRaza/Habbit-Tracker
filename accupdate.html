<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | Habit Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="update-page">
    <header class="settings-header">
        <h1>HabitFlow</h1>
        <h2>Update Account</h2>
    </header>
    <div class="auth-card">
        <form action="#" class="auth-form">
            <div class="input-group">
                <label for="firstName">First Name:</label>
                <input type="text" name="firstName" id="firstName" placeholder="Jane" autocomplete="on" required
                    autofocus>
            </div>

            <div class="input-group">
                <label for="lastName">Last Name:</label>
                <input type="text" name="lastName" id="lastName" placeholder="Doe" autocomplete="on" required>
            </div>

            <div class="input-group">
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label for="password">Confirm Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-register">Update</button>
        </form>
    </div>

</body>


</html>
