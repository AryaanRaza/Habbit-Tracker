<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker | Build Better Habits</title>
    <!-- BASE -->
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/root.css">

    <!-- GLOBAL -->
    <link rel="stylesheet" href="css/global.css">

    <!-- COMPONENTS -->
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/chips.css">
    <link rel="stylesheet" href="css/components/modal.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/navigation.css">

    <!-- PAGE -->
    <link rel="stylesheet" href="css/pages/dashboard.css">
    <link rel="stylesheet" href="css/pages/stats.css">
    
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="stats-page">

    <main class="stats-main">
        <header class="stats-header">
            <h1 class="app-title" style="font-size: 6rem;">HabitFlow</h1>
            <h2>Insights</h2>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <span class="metric-value">28</span>
                <span class="metric-label">Days Active</span>
            </div>
            <div class="metric-card">
                <span class="metric-value">92%</span>
                <span class="metric-label">Consistency</span>
            </div>
        </div>

        <section class="heatmap-section">
            <h3>Activity Heatmap</h3>
            <div class="heatmap-wrapper">
                <div id="heatmap-grid" class="heatmap-grid">
                    <div class="cube level-1"></div>
                    <div class="cube level-3"></div>
                    <div class="cube level-0"></div>
                    <div class="cube level-2"></div>
                    <div class="cube level-4"></div>
                </div>
            </div>
            <p class="helper-text">Darker squares = More habits completed</p>
        </section>

        <div class="chart-container">
            <h3>Category Focus</h3>
            <div class="pie-chart"></div>
            <div class="chart-legend">
                <p><span class="dot coding"></span> Coding</p>
                <p><span class="dot health"></span> Health</p>
                <p><span class="dot read"></span> Reading</p>
            </div>
        </div>

        <div class="chart-container">
            <h3>Weekly Progress</h3>
            <div class="bar-chart">
                <div class="bar" style="height: 60%;" data-day="M"></div>
                <div class="bar" style="height: 80%;" data-day="T"></div>
                <div class="bar" style="height: 40%;" data-day="W"></div>
                <div class="bar" style="height: 90%;" data-day="T"></div>
                <div class="bar" style="height: 100%;" data-day="F"></div>
                <div class="bar" style="height: 30%;" data-day="S"></div>
                <div class="bar" style="height: 50%;" data-day="S"></div>
            </div>
        </div>


        <section class="achievements-section">
            <h3>Badges Unlocked</h3>
            <div class="badge-row">
                <div class="badge-icon unlocked">
                    <span class="material-symbols-rounded">local_fire_department</span>
                    <p>7 Day Streak</p>
                </div>
                <div class="badge-icon unlocked">
                    <span class="material-symbols-rounded">workspace_premium</span>
                    <p>Habit Master</p>
                </div>
                <div class="badge-icon locked">
                    <span class="material-symbols-rounded">lock</span>
                    <p>30 Day King</p>
                </div>
            </div>
        </section>
    </main>
    <script src="js/navigation.js"></script>
</body>

</html>
