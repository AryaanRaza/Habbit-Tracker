<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Habit Tracker</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- <link rel="stylesheet" href="css/dashboard.css"> -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="dashboard-container">

    <!-- Header Section -->
    <header class="dash-header">
        <h1 class="dash-title">HabitFlow</h1>
        <h2 class="dash-tag">Build better habits,one day at a time</h2>
    </header>
    <main class="dash-wrapper">
        <!-- Quick Stats -->
        <section class="stats-overview">
            <div class="stat-card">
                <span class="stat-icon">🔥</span>
                <span class="stat-label">
                    <p>Current Streak</p>
                </span>
                <span class="stat-value">
                    <strong>15</strong>
                </span>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🏆</span>
                <span class="stat-label">
                    <p>Best Streak</p>
                </span>
                <span class="stat-value"><strong>12</strong></span>
            </div>
            <div class="stat-card">
                <span class="stat-icon">✅</span>
                <span class="stat-label">
                    <p>Total Completion</p>
                </span>
                <span class="stat-value"><strong>28</strong></span>
            </div>
        </section>

        <!-- Input Section -->
        <section class="habit-input-area">
            <h2 class="section-label">Add a New Habit</h2>
            <div class="input-wrapper">
                <!-- <label for="text">Email Address</label> -->
                <input type="text" class="habit-field" placeholder="Enter Habit">
                <button type="submit" class="btn btn-add-habit">Add Habit</button>
            </div>
        </section>

        <!-- The Cards -->
        <section class="habit-list-container">
            <h2 class="section-label">My Habits</h2>

            <!-- Individual Cards -->
            <article class="habit-card">
                <div class="habit-info">
                    <h3 class="habit-name">Code for 1 Hour</h3>
                    <div class="habit-meta">
                        <p class="habit-stats">Streak: 5 days | Total: 14</p>
                    </div>
                </div>
                <button class="btn btn-complete">Mark as Done</button>
            </article>

            <article class="habit-card">
                <div class="habit-info">
                    <h3 class="habit-name">Sleep</h3>
                    <div class="habit-meta">
                        <p class="habit-stats">Streak: 5 days | Total: 14</p>
                    </div>
                </div>
                <button class="btn btn-complete">Mark as Done</button>
            </article>

            <!-- Remainng Cards -->
            <!-- .............. -->
        </section>
        <footer class="dash-footer">
            <p class="motivation-text">Keep it up! Stay consistent!</p>
            <script src="/js/navigation.js"></script>
        </footer>
    </main>
</body>

</html>
