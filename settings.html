<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | HabitFlow</title>
    <!-- BASE -->
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/root.css">

    <!-- GLOBAL -->

    <!-- COMPONENTS -->

    <link rel="stylesheet" href="css/components/navigation.css">

    <link rel="stylesheet" href="css/pages/settings.css">

<body class="settings-page">
    <main class="settings-layout">
        <!-- <header class="settings-branding">
            <h1>HabitFlow</h1>
            <p>Manage your account and app details.</p>
        </header> -->

        <div class="settings-card glass-panel">

            <!-- PAGE HEADER -->
            <header class="settings-page-header">
                <div class="header-content">
                    <h1>Settings</h1>
                    <p>Manage your account and app details.</p>
                </div>

                <div class="header-avatar">
                    G
                </div>
            </header>

            <!-- ACCOUNT -->
            <section class="settings-section">
                <h3 class="section-label">ACCOUNT</h3>

                <nav class="settings-list">
                    <a href="settings/accupdate.html" class="settings-item">
                        <div class="item-content">
                            <span class="item-icon">👤</span>
                            <span class="item-text">Account</span>
                        </div>
                        <span class="chevron">›</span>
                    </a>
                </nav>
            </section>

            <!-- PREFERENCES -->
            <section class="settings-section">
                <h3 class="section-label">PREFERENCES</h3>

                <nav class="settings-list">

                    <a href="#" class="settings-item">
                        <div class="item-content">
                            <span class="item-icon">🔔</span>
                            <span class="item-text">Notifications</span>
                        </div>
                        <span class="chevron">›</span>
                    </a>

                    <a href="#" class="settings-item">
                        <div class="item-content">
                            <span class="item-icon">🎨</span>
                            <span class="item-text">Appearance</span>
                        </div>
                        <span class="chevron">›</span>
                    </a>

                </nav>
            </section>

            <!-- LEGAL -->
            <section class="settings-section">
                <h3 class="section-label">LEGAL</h3>

                <nav class="settings-list">

                    <a href="settings/terms.html" class="settings-item">
                        <div class="item-content">
                            <span class="item-icon">📜</span>
                            <span class="item-text">Terms and Conditions</span>
                        </div>
                        <span class="chevron">›</span>
                    </a>

                    <a href="settings/policy.html" class="settings-item">
                        <div class="item-content">
                            <span class="item-icon">🔒</span>
                            <span class="item-text">Privacy Policy</span>
                        </div>
                        <span class="chevron">›</span>
                    </a>

                </nav>
            </section>

            <!-- APP -->
            <section class="settings-section">
                <h3 class="section-label">APP</h3>

                <nav class="settings-list">

                    <a href="settings/about.html" class="settings-item">
                        <div class="item-content">
                            <span class="item-icon">ℹ️</span>
                            <span class="item-text">About App</span>
                        </div>
                        <span class="chevron">›</span>
                    </a>

                    <a href="#" class="settings-item danger-item">
                        <div class="item-content">
                            <span class="item-icon">🗑️</span>
                            <span class="item-text">Data & Privacy</span>
                        </div>
                        <span class="chevron">›</span>
                    </a>

                </nav>
