<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | Habit Tracker</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="sub-settings-page update">
    <header class="settings-header sub-header">
        <div class="header-top">
            <a href="/settings.html" class="back-btn">
                <span class="material-symbols-rounded">arrow_back_ios_new</span>
            </a>
            <h1>HabitFlow</h1>
        </div>
        <h2>Update Account</h2>
    </header>
    <div class="auth-card">
        <form action="#" class="auth-form">
            <div class="input-group">
                <label for="firstName">First Name:</label>
                <input type="text" name="firstName" id="firstName" placeholder="Jane" autocomplete="on" required
                    autofocus>
            </div>

            <div class="input-group">
                <label for="lastName">Last Name:</label>
                <input type="text" name="lastName" id="lastName" placeholder="Doe" autocomplete="on" required>
            </div>

            <div class="input-group">
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label for="password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-glow">Update</button>
        </form>
    </div>
    <script src="/js/navigation.js"></script>
</body>


</html>
