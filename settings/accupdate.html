<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Update | HabitFlow</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="sub-settings-page update">
    <main class="sub-settings-layout">
        <header class="sub-settings-branding">
            <div class="header-top">
                <a href="../settings.html" class="back-btn">
                    <span class="material-symbols-rounded">arrow_back_ios_new</span>
                </a>
            </div>
            <h1>HabitFlow</h1>
            <p>Keep your profile as sharp as your streaks.</p>
        </header>

        <section class="sub-settings-card glass-panel">
            <header class="sub-page-header">
                <div class="sub-page-title">
                    <h2>Update Account</h2>
                    <p>Modify your personal details below.</p>
                </div>
            </header>

            <div class="sub-page-content">
                <form action="#" class="auth-form update-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="firstName">First Name</label>
                            <input type="text" name="firstName" id="firstName" placeholder="Jane" required autofocus>
                        </div>

                        <div class="input-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" name="lastName" id="lastName" placeholder="Doe" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob">
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="form-grid">
                        <div class="input-group">
                            <label for="password">New Password</label>
                            <input type="password" id="password" placeholder="••••••••">
                        </div>

                        <div class="input-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-glow">Save Changes</button>
                </form>
            </div>
        </section>
    </main>

    <script src="../js/navigation.js"></script>
</body>
</html>
