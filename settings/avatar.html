<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Avatar | HabitFlow</title>

    <!-- =============================================
         STYLESHEETS
         Base → Global → Components → Page-specific
         ============================================= -->

    <!-- BASE: CSS reset and design token variables -->
    <link rel="stylesheet" href="../css/base/reset.css">
    <link rel="stylesheet" href="../css/base/root.css">

    <!-- GLOBAL: Shared utility styles across all pages -->
    <link rel="stylesheet" href="../css/global.css">

    <!-- COMPONENTS: Reusable UI elements -->
    <link rel="stylesheet" href="../css/components/navigation.css">
    <link rel="stylesheet" href="../css/components/back-button.css">
    <link rel="stylesheet" href="../css/components/toast.css">
    <link rel="stylesheet" href="../css/components/password-strength.css">

    <!-- PAGE: Settings layout, subpage shell, and account-specific styles -->
    <link rel="stylesheet" href="../css/pages/settings-main.css">
    <link rel="stylesheet" href="../css/pages/settings-subpages.css">
    <link rel="stylesheet" href="../css/pages/account-settings.css">
    <link rel="stylesheet" href="../css/pages/auth.css">

    <!-- ICON FONT: Material Symbols (Rounded variant) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<!-- Page modifier classes:
     .sub-settings-page  → shared shell for all settings subpages
     .update             → specific to the account update subpage -->

<body class="sub-settings-page update">
    <main class="sub-settings-layout">

        <!-- =============================================
             PAGE HEADER
             Back button + page title and description
             ============================================= -->
        <header class="sub-page-banner">

            <!-- Back navigation: returns to main settings hub -->
            <div class="header-top">
                <a href="../settings.html" class="back-btn">
                    <span class="material-symbols-rounded">
                        arrow_back_ios_new
                    </span>
                </a>
            </div>

            <!-- Page title block -->
            <div class="page-heading">
                <h1>My Avatar</h1>

                <p>
                    Choose and manage your Streaksaur companion.
                </p>
            </div>

        </header>


        <!-- =============================================
             MAIN CARD
             Glassmorphism panel that wraps the full
             account hero + all form sections
             ============================================= -->
        <section class="sub-settings-card glass-panel">

            <!-- -----------------------------------------
                 ACCOUNT HERO
                 Profile avatar, display name, streak badge,
                 stats row, and the inline avatar picker
                 (hidden by default; shown on mobile or as
                 fallback when the modal is not used)
                 ----------------------------------------- -->
            <section class="account-hero">

                <!-- Avatar display + edit trigger button -->
                <div class="avatar-wrapper">
                    <!-- Avatar display: shows emoji or initial; data-avatar tracks current selection -->
                    <div class="account-avatar" id="account-avatar" data-avatar="initial">
                        H
                    </div>

                    <!-- Edit button: triggers the avatar picker modal (desktop) or inline picker (mobile) -->
                    <button type="button" class="avatar-edit-btn" id="avatar-toggle-btn">
                        <span class="material-symbols-rounded">
                            edit
                        </span>
                    </button>
                </div>

                <!-- User's display name — populated dynamically via JS -->
                <h2 class="account-profile-name" id="profileName"> </h2>

                <!-- Current streak badge -->
                <div class="account-streak">
                    🔥 1 day streak
                </div>

                <!-- Quick stats row: habits count, completions, best streak -->
                <div class="account-stats">
                    <div class="account-stat">
                        <span class="stat-number" id="settings-total-habits">0</span>
                        <span class="stat-label">Habits</span>
                    </div>

                    <div class="account-stat">
                        <span class="stat-number" id="settings-total-completions">0</span>
                        <span class="stat-label">Completions</span>
                    </div>

                    <div class="account-stat">
                        <span class="stat-number" id="settings-best-streak">0</span>
                        <span class="stat-label">Best Streak</span>
                    </div>
                </div>

                <!-- -----------------------------------------
                     INLINE AVATAR PICKER
                     Alternative picker rendered inside the hero
                     section. Hidden by default (.hidden).
                     Used as a non-modal fallback — JS toggles
                     visibility via the edit button above.
                     ----------------------------------------- -->


            </section>
            <!-- /account-hero -->


        </section>
        <!-- /sub-settings-card -->


        <!-- =============================================
             AVATAR PICKER MODAL
             Full-screen overlay with a glassmorphism card.
             Triggered by the edit button in .avatar-wrapper.
             JS toggles .show on .avatar-modal-overlay to
             animate it in/out. Used on desktop; the inline
             .avatar-picker above is the mobile fallback.
             ============================================= -->
        <div class="avatar-modal-overlay" id="avatar-modal">

            <div class="avatar-modal">

                <!-- Modal header: title + close button -->
                <div class="avatar-modal-header">
                    <h3>Choose Avatar</h3>
                    <button type="button" class="avatar-modal-close" id="close-avatar-modal">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>

                <!-- Grid of selectable emoji avatars (mirrors the inline picker above) -->
                <div class="avatar-grid">


                    <button type="button" class="avatar-option active" data-avatar="basic">
                        <img src="../img/avatars/streaksaur/basic.png" alt="Basic Streaksaur" class="avatar-option-img">
                    </button>

                    <button type="button" class="avatar-option" data-avatar="astronaut">
                        <img src="../img/avatars/streaksaur/astronaut.png" alt="Astronaut Streaksaur"
                            class="avatar-option-img">
                    </button>


                    <button type="button" class="avatar-option" data-avatar="dragon">
                        <img src="../img/avatars/streaksaur/dragon.png" alt="Dragon Streaksaur"
                            class="avatar-option-img">
                    </button>

                    <button type="button" class="avatar-option" data-avatar="explorer">
                        <img src="../img/avatars/streaksaur/explorer.png" alt="Explorer Streaksaur"
                            class="avatar-option-img">
                    </button>



                    <button type="button" class="avatar-option" data-avatar="fire">
                        <img src="../img/avatars/streaksaur/fire.png" alt="Fire Streaksaur" class="avatar-option-img">
                    </button>

                    <button type="button" class="avatar-option" data-avatar="king">
                        <img src="../img/avatars/streaksaur/king.png" alt="King Streaksaur" class="avatar-option-img">
                    </button>


                    <button type="button" class="avatar-option" data-avatar="knight">
                        <img src="../img/avatars/streaksaur/knight.png" alt="Knight Streaksaur"
                            class="avatar-option-img">
                    </button>

                    <button type="button" class="avatar-option" data-avatar="mage">
                        <img src="../img/avatars/streaksaur/mage.png" alt="Mage Streaksaur" class="avatar-option-img">
                    </button>



                    <button type="button" class="avatar-option" data-avatar="ninja">
                        <img src="../img/avatars/streaksaur/ninja.png" alt="Ninja Streaksaur" class="avatar-option-img">
                    </button>


                    <button type="button" class="avatar-option" data-avatar="warrior">
                        <img src="../img/avatars/streaksaur/warrior.png" alt="Warrior Streaksaur"
                            class="avatar-option-img">
                    </button>



                    <!-- Continue for the rest -->

                </div>

            </div>

        </div>
        <!-- /avatar-modal-overlay -->

        <!-- =============================================
             TOAST NOTIFICATION
             Populated and shown by JS after save actions
             or validation feedback
             ============================================= -->
        <div class="toast" id="toast"></div>

    </main>

    <!-- =============================================
         SCRIPTS
         Core → Shared utilities → Page-specific
         ============================================= -->

    <!-- CORE: Storage abstraction and auth guard -->
    <script src="../js/core/storage.js"></script>
    <script src="../js/core/auth.js"></script>

    <!-- SHARED: Nav behaviour, back-button logic, password visibility toggle -->
    <script src="../js/shared/profile-utils.js"></script>
    <script src="../js/shared/navigation.js"></script>
    <script src="../js/shared/smart-back.js"></script>
    <script src="../js/shared/password-ui.js"></script>

    <!-- PAGE: Account settings form logic, avatar picker, save/validation -->
    <script src="../js/settings/account-settings.js"></script>

</body>

</html>
